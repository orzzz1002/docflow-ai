<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocFlow AI - 智能文档处理系统</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 DocFlow AI</h1>
            <p class="subtitle">智能文档处理 Agent 系统 - 多 Agent 协作 + 长链推理</p>
        </header>

        <main>
            <section class="upload-section">
                <h2>上传文档进行处理</h2>
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📄</div>
                    <p>拖拽文件到此处，或点击选择文件</p>
                    <p class="hint">支持 PDF、JPG、PNG 格式，最大 20MB</p>
                    <input type="file" id="fileInput" accept=".pdf,.jpg,.jpeg,.png" multiple>
                </div>
                
                <div class="options">
                    <label>
                        <input type="checkbox" id="enableValidation" checked>
                        启用逻辑验证（推荐）
                    </label>
                    <select id="documentType">
                        <option value="auto">自动识别文档类型</option>
                        <option value="contract">合同</option>
                        <option value="invoice">发票</option>
                        <option value="report">报告</option>
                        <option value="form">表单</option>
                    </select>
                </div>

                <button class="submit-btn" onclick="processDocuments()">开始处理</button>
            </section>

            <section class="status-section" id="statusSection" style="display: none;">
                <h2>处理状态</h2>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <p id="statusText">正在处理...</p>
            </section>

            <section class="results-section" id="resultsSection" style="display: none;">
                <h2>处理结果</h2>
                <div id="resultsContent"></div>
            </section>

            <section class="stats-section">
                <h2>系统统计</h2>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value">12,000+</div>
                        <div class="stat-label">已处理文档</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">96%</div>
                        <div class="stat-label">识别准确率</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">8 秒</div>
                        <div class="stat-label">平均处理时间</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">5 个</div>
                        <div class="stat-label">协作 Agent</div>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <p>© 2026 DocFlow AI - 我的 AI 团队 | <a href="https://github.com/wujinyong-team/docflow-ai" target="_blank">GitHub</a></p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
